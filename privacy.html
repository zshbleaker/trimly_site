<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy — Trimly</title>
  <meta name="description" content="Trimly's privacy policy. Trimly runs fully offline on iPhone, iPad, and Mac — it collects no data, requests no network access, and has no account system.">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✂️</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-start: #32ADE6;
      --blue-end: #007AFF;
      --green: #30D158;
      --text-primary: #1D1D1F;
      --text-secondary: #6E6E73;
      --text-tertiary: #AEAEB2;
      --bg-primary: #FFFFFF;
      --bg-secondary: #F5F5F7;
      --border-color: rgba(0, 0, 0, 0.06);
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'Noto Sans SC', 'Noto Sans JP', Arial, sans-serif;
      --max-w: 1080px;
      --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      color: var(--text-primary);
      background: var(--bg-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* === NAV === */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.82);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border-color);
    }

    .nav-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text-primary);
    }

    .nav-brand svg { width: 32px; height: 32px; border-radius: 22%; }
    .nav-brand span { font-weight: 600; font-size: 17px; letter-spacing: -0.01em; }

    .nav-right { display: flex; align-items: center; gap: 16px; }

    .nav-link {
      font-size: 14px;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--text-primary); }

    .lang-switcher { position: relative; }

    .lang-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 6px 12px;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s var(--ease);
    }

    .lang-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .lang-btn svg { width: 16px; height: 16px; }

    .lang-dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      background: rgba(255,255,255,0.92);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      overflow: hidden;
      min-width: 140px;
    }

    .lang-dropdown.open { display: block; }

    .lang-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      font-size: 14px;
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.15s;
      border: none;
      background: none;
      width: 100%;
      font-family: var(--font);
      text-align: left;
    }

    .lang-option:hover { background: var(--bg-secondary); }
    .lang-option .check { color: var(--blue-end); font-weight: 600; opacity: 0; }
    .lang-option.active .check { opacity: 1; }

    /* === LEGAL CONTENT === */
    .legal {
      max-width: 720px;
      margin: 0 auto;
      padding: 72px 24px 96px;
    }

    .legal-eyebrow {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--blue-end);
      margin-bottom: 12px;
    }

    .legal h1 {
      font-size: clamp(30px, 5vw, 44px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.12;
      margin-bottom: 12px;
    }

    .legal-updated {
      font-size: 14px;
      color: var(--text-tertiary);
      margin-bottom: 32px;
    }

    .legal-intro {
      font-size: clamp(16px, 2.2vw, 19px);
      color: var(--text-secondary);
      margin-bottom: 48px;
    }

    .legal-section { margin-bottom: 36px; }

    .legal-section h2 {
      font-size: clamp(19px, 2.6vw, 22px);
      font-weight: 600;
      letter-spacing: -0.015em;
      margin-bottom: 10px;
    }

    .legal-section p {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    .legal-contact {
      margin-top: 8px;
      padding: 24px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      font-size: 16px;
      color: var(--text-secondary);
    }

    .legal-contact a { color: var(--blue-end); text-decoration: none; font-weight: 500; }
    .legal-contact a:hover { text-decoration: underline; }

    @media (max-width: 767px) {
      .legal { padding: 48px 20px 72px; }
      .legal-intro { margin-bottom: 36px; }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary:   #F5F5F7;
        --text-secondary: #98989D;
        --text-tertiary:  #636366;
        --bg-primary:     #2C2C2E;
        --bg-secondary:   #3A3A3C;
        --border-color:   rgba(255, 255, 255, 0.08);
      }

      nav {
        background: rgba(44, 44, 46, 0.85);
      }

      .lang-dropdown {
        background: rgba(44, 44, 46, 0.96);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      }
      .lang-option:hover { background: rgba(255, 255, 255, 0.06); }
    }

    /* === FOOTER === */
    footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--border-color);
    }

    .footer-copy { font-size: 13px; color: var(--text-tertiary); }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 12px;
    }

    .footer-links a {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--text-primary); }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">
        <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">

          </defs>
          <g mask="url(#n-holes)">
            <rect x="162" y="362" width="700" height="300" rx="24" fill="url(#n-track)"/>
            <rect x="300" y="362" width="220" height="300" fill="url(#n-clip)"/>
            <rect x="600" y="362" width="160" height="300" fill="url(#n-clip)"/>
            <path d="M180,502 v20 M210,482 v60 M240,462 v100 M270,492 v40 M300,432 v160 M330,472 v80 M360,497 v30 M390,442 v140 M420,472 v80 M450,412 v200 M480,452 v120 M510,482 v60 M540,462 v100 M570,492 v40 M600,472 v80 M630,452 v120 M660,432 v160 M690,482 v60 M720,462 v100 M750,492 v40 M780,442 v140 M810,472 v80 M840,497 v30" stroke="#fff" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.4"/>
          </g>
          <rect x="162" y="362" width="700" height="300" rx="24" fill="none" stroke="#555" stroke-width="4" opacity="0.5"/>
          <polygon points="276,266 324,266 300,311" fill="#30D158" stroke="#30D158" stroke-width="8" stroke-linejoin="round"/>
          <rect x="296" y="306" width="8" height="390" rx="4" fill="#30D158"/>
        </svg>
        <span>Trimly</span>
      </a>

      <div class="nav-right">
        <a class="nav-link" href="index.html" data-i18n="nav.home">Home</a>
        <div class="lang-switcher">
          <button class="lang-btn" onclick="toggleLangDropdown(event)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/></svg>
            <span class="lang-current">EN</span>
          </button>
          <div class="lang-dropdown" id="langDropdown">
            <button class="lang-option" data-lang="en" onclick="setLanguage('en')">English <span class="check">&#10003;</span></button>
            <button class="lang-option" data-lang="zh" onclick="setLanguage('zh')">简体中文 <span class="check">&#10003;</span></button>
            <button class="lang-option" data-lang="ja" onclick="setLanguage('ja')">日本語 <span class="check">&#10003;</span></button>
            <button class="lang-option" data-lang="ar" onclick="setLanguage('ar')">عربي <span class="check">&#10003;</span></button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- LEGAL CONTENT -->
  <main class="legal">
    <div class="legal-eyebrow" data-i18n="eyebrow">Legal</div>
    <h1 data-i18n="title">Privacy Policy</h1>
    <p class="legal-updated" data-i18n="updated">Last updated: May 27, 2026</p>
    <p class="legal-intro" data-i18n="intro"></p>
    <div id="sections"></div>
    <div class="legal-contact" id="contact"></div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-links">
      <a href="index.html" data-i18n="footer.home">Home</a>
      <a href="mailto:hi@zshbleaker.me" data-i18n="footer.support">Support</a>
    </div>
    <p class="footer-copy">&copy; 2026 Trimly</p>
  </footer>

<script>

const T = {

    updated: '最后更新：2026 年 5 月 27 日',
    intro: 'Trimly 完全在你的设备上运行，你的媒体永远无需离开你的 iPhone、iPad 或 Mac。本政策用直白的语言说明这对你的隐私意味着什么。',
    sections: [
      { h: '不收集任何数据', p: 'Trimly 不收集、不存储、也不传输任何个人信息。没有数据分析，没有追踪，没有广告标识符，也没有任何形式的使用统计。' },
      { h: '完全离线', p: 'Trimly 不请求网络权限，也不连接互联网。由于不会向任何地方发送数据，你的素材和编辑内容都完整保留在你的设备上。' },
      { h: '文件与照片访问', p: '当你从「文件」App、外接硬盘或照片图库打开媒体时，Trimly 仅读取它，以便你裁剪和导出。所有处理都在你的设备本地完成，导出的片段会保存到你选择的位置。Trimly 仅在获得你的授权后访问照片图库，且只用于导入或保存你所选择的媒体。' },

      { h: '儿童隐私', p: '由于 Trimly 完全不收集任何数据，因此不会有意收集包括儿童在内的任何人的信息。' },

    ],

    footer: { home: '首页', support: '支持' }
  },

  ja: {
    langLabel: '日本語',
    nav: { home: 'ホーム' },
    eyebrow: '法的事項',
    title: 'プライバシーポリシー',
    updated: '最終更新：2026年5月27日',
    intro: 'Trimlyは、完全にあなたのデバイス上で動作するように設計されています。あなたのメディアがiPhone、iPad、Macから外に出る必要はありません。本ポリシーでは、それがあなたのプライバシーにとって何を意味するかを平易に説明します。',

      { h: 'データを収集しません', p: 'Trimlyは個人情報を収集・保存・送信しません。分析、トラッキング、広告識別子、利用テレメトリの類は一切ありません。' },

      { h: 'ファイルと写真へのアクセス', p: 'ファイルApp、外付けドライブ、写真ライブラリからメディアを開くと、Trimlyはトリミングと書き出しのためにそれを読み取るだけです。処理はすべてデバイス内でローカルに行われ、書き出したクリップはあなたが選んだ場所に保存されます。Trimlyはあなたの許可がある場合にのみ写真ライブラリにアクセスし、選択したメディアの読み込みや保存にのみ使用します。' },

      { h: 'لا حسابات، لا أطراف ثالثة', p: 'لا يوجد في Trimly نظام حسابات أو تسجيل دخول. لا تستخدم أي خدمات أو SDKs أو معالجة سحابية خاصة بأطراف ثالثة.' },
      { h: 'خصوصية الأطفال', p: 'بما أن Trimly لا تجمع أي بيانات على الإطلاق، فإنها لا تجمع عن قصد أي معلومات من أي شخص، بمن فيهم الأطفال.' },
      { h: 'التعديلات على هذه السياسة', p: 'إذا تغيّرت هذه السياسة، سيُنشر الإصدار المحدَّث على هذه الصفحة مع تاريخ جديد.' }
    ],
    contactLabel: 'لأي استفسار حول الخصوصية، تواصل معنا على',
    footer: { home: 'الرئيسية', support: 'الدعم' }
  }
};

let currentLang = 'en';

function detectLanguage() {
  try {
    const saved = localStorage.getItem('trimly-lang');
    if (saved && T[saved]) return saved;
  } catch(e) {}
  const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  if (lang.startsWith('zh')) return 'zh';
  if (lang.startsWith('ja')) return 'ja';
  if (lang.startsWith('ar')) return 'ar';
  return 'en';
}

function applyStaticTranslations() {
  const t = T[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const path = el.getAttribute('data-i18n').split('.');
    let val = t;
    for (const k of path) { val = val?.[k]; }
    if (typeof val === 'string') el.textContent = val;
  });
  document.querySelector('.lang-current').textContent = t.langLabel;
  document.querySelectorAll('.lang-option').forEach(opt => {
    opt.classList.toggle('active', opt.dataset.lang === currentLang);
  });
}

function renderSections() {
  const t = T[currentLang];
  document.getElementById('sections').innerHTML = t.sections.map(s =>
    `<div class="legal-section"><h2>${s.h}</h2><p>${s.p}</p></div>`).join('');
  document.getElementById('contact').innerHTML =
    `${t.contactLabel} <a href="mailto:${EMAIL}">${EMAIL}</a>.`;
}

function setLanguage(lang) {
  currentLang = lang;
  try { localStorage.setItem('trimly-lang', lang); } catch(e) {}
  document.documentElement.lang = lang === 'zh' ? 'zh-Hans' : lang;
  document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
  applyStaticTranslations();
  renderSections();
  closeLangDropdown();
}

function toggleLangDropdown(e) {
  e.stopPropagation();
  document.getElementById('langDropdown').classList.toggle('open');
}
function closeLangDropdown() {
  document.getElementById('langDropdown').classList.remove('open');
}
document.addEventListener('click', closeLangDropdown);

document.addEventListener('DOMContentLoaded', () => {
  currentLang = detectLanguage();
  setLanguage(currentLang);
});
</script>

</body>
